<html>
    <head>
        <title>CONTACT</title>
        <link rel="stylesheet" href="contact.css">
    </head>
    <body>
        <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">MySite</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </nav>

    <main class="contact-container">
        <header class="contact-header">
            <h1>Get In Touch</h1>
            <p class="subtitle">Have a question or want to work together? Drop us a message.</p>
        </header>

        <div class="contact-grid">
            
            <section class="contact-info">
                <h2>Contact Information</h2>
                <p class="info-text">Fill out my form and I will get back to you within 24 hours.</p>
                
                <div class="info-details">
                    <div class="info-item">
                        <span class="info-icon">📍</span>
                        <p>KANO, NIGERIA</p>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">✉️</span>
                        <p>muhammadkhadija@gmail.com</p>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">📞</span>
                        <p>+234 xxxxxxx</p>
                    </div>
                </div>
            </section>

            <section class="contact-form-card">
                <form action="#" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="first and last name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="northwestkano@gmail.com">
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </section>

        </div>
    </main>



</body>
</html>
